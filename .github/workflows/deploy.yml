name: Build and Deploy Web App to VPS

on:
  push:
    branches:
      - OCC_Projects

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: occ-web-app/package-lock.json

      - name: Install Dependencies
        run: |
          cd occ-web-app
          npm ci

      - name: Build Web App
        run: |
          cd occ-web-app
          npm run build

      - name: Deploy Built React App to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "occ-web-app/dist/*"
          target: "/var/www/html"
          strip_components: 2

      - name: Deploy PHP Backend and Root Assets to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "api/**,db/**,*.png,*.jpg,*.jpeg,*.svg"
          target: "/var/www/html"
