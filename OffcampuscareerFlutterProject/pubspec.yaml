name: offcampuscareer_flutter
description: A modern career platform for student training, job matching, and recruiter management.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.6.0
  google_fonts: ^6.1.0
  provider: ^6.1.1
  font_awesome_flutter: ^10.7.0
  intl: ^0.19.0
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/favicon.png
    - assets/images/purple_bg_icon.png
    - assets/images/white_bg_icon.png
    - assets/images/transparent_icon.png
